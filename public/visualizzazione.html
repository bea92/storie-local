<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Costellazione delle storie</title>

  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    :root {
      --blue: #082b50;
      --blue-2: #123d70;
      --cream: #fff8ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #164f86, var(--blue));
      color: var(--cream);
      overflow: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      text-transform: uppercase;
      font-size: clamp(22px, 5vw, 42px);
      line-height: .95;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .hint {
      max-width: 280px;
      font-size: 14px;
      line-height: 1.3;
      opacity: .85;
      text-align: right;
    }

    #network {
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      width: min(420px, calc(100vw - 36px));
      max-height: 48vh;
      overflow: auto;
      background: rgba(255, 248, 236, .96);
      color: var(--blue-2);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      display: none;
    }

    .panel.visible {
      display: block;
    }

    .meta {
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 800;
      opacity: .65;
      margin-bottom: 10px;
      letter-spacing: .04em;
    }

    .text {
      font-size: 18px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .close {
      margin-top: 18px;
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--blue-2);
      color: white;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      header {
        align-items: flex-start;
      }

      .hint {
        font-size: 12px;
        max-width: 150px;
      }

      .panel {
        right: 12px;
        bottom: 12px;
        width: calc(100vw - 24px);
        max-height: 42vh;
      }
    }

    .visualization-link {
    position: fixed;
    bottom: 18px;
    right: 18px;

    background: rgba(18, 61, 112, 0.95);
    color: white;

    padding: 12px 18px;
    border-radius: 999px;

    text-decoration: none;
    font-size: 14px;
    font-weight: 700;

    box-shadow: 0 8px 18px rgba(0,0,0,.25);

    transition: .2s;
    z-index: 999;
}

.visualization-link:hover {
    background: #082b50;
    transform: translateY(-2px);
}

@media (max-width: 600px) {
    .visualization-link {
        font-size: 13px;
        padding: 10px 16px;
    }
}

  </style>
</head>

<body>
  <header>
    <h1>Costellazione<br>delle storie</h1>
    <div class="hint">Tocca una foto per leggere la storia.</div>
  </header>

  <div id="network"></div>

  <aside id="panel" class="panel">
    <div id="meta" class="meta"></div>
    <div id="text" class="text"></div>
    <button class="close" onclick="closePanel()">Chiudi</button>
  </aside>

  <script>
    async function init() {
      const response = await fetch("/api/export");
      const data = await response.json();

      const stories = data.stories || [];

      const nodes = stories.map(story => {
        const code = story.photo_code || "default";

        return {
          id: story.id,
          shape: "image",
          image: `/photos/${code}.png`,
          label: "",
          title: story.text,
          size: story.kind === "seed" ? 110 : 90,
          story
        };
      });

      const edges = stories
        .filter(story => story.parent_story_id)
        .map(story => ({
          from: story.parent_story_id,
          to: story.id,
          arrows: "to",
          color: {
            color: "rgba(255,248,236,.45)",
            highlight: "#fff8ec"
          },
          width: 2,
          smooth: {
            type: "continuous"
          }
        }));

      const container = document.getElementById("network");

      const network = new vis.Network(
        container,
        {
          nodes: new vis.DataSet(nodes),
          edges: new vis.DataSet(edges)
        },
        {
          autoResize: true,

          nodes: {
            shape: "image",
            borderWidth: 0,
            shadow: {
              enabled: true,
              color: "rgba(0,0,0,.35)",
              size: 18,
              x: 0,
              y: 6
            },
            shapeProperties: {
              useImageSize: false,
              interpolation: true
            }
          },

          edges: {
            shadow: false
          },

          physics: {
            enabled: true,
            barnesHut: {
              gravitationalConstant: -5200,
              centralGravity: 0.15,
              springLength: 190,
              springConstant: 0.035,
              damping: 0.28,
              avoidOverlap: 0.55
            },
            stabilization: {
              iterations: 160
            }
          },

          interaction: {
            hover: true,
            tooltipDelay: 120,
            navigationButtons: true,
            keyboard: true
          }
        }
      );

      network.on("click", params => {
        if (!params.nodes.length) {
          closePanel();
          return;
        }

        const nodeId = params.nodes[0];
        const story = stories.find(s => s.id === nodeId);

        if (story) {
          openPanel(story);
        }
      });
    }

    function openPanel(story) {
      document.getElementById("meta").innerText =
        `ID ${story.id}` +
        (story.photo_code ? ` · FOTO ${story.photo_code}` : "") +
        (story.kind ? ` · ${story.kind}` : "") +
        (story.parent_story_id ? ` · collegata a ID ${story.parent_story_id}` : "");

      document.getElementById("text").innerText = story.text;
      document.getElementById("panel").classList.add("visible");
    }

    function closePanel() {
      document.getElementById("panel").classList.remove("visible");
    }

    init();
  </script>

  
  <a href="/index.html" class="visualization-link">
    Home →
</a>

</body>
</html>
